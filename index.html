<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Life | الرئيسية</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #242424; 
            --bg-search: #333333;
            --bg-card-title: #3a3a3a;
            --text-color: #ffffff;
        }

        body {
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-color);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 80px; 
            overflow-x: hidden;
        }

        /* الشريط العلوي */
        header { 
            width: 100%; padding: 20px 30px; display: flex; justify-content: space-between; 
            align-items: center; box-sizing: border-box; background-color: var(--bg-main); 
        }
        .logo-title { font-size: 24px; font-weight: bold; color: #cfa861; }

        /* شريط البحث */
        .search-container { width: 90%; max-width: 800px; margin: 10px 0 40px 0; }
        .search-bar { 
            width: 100%; padding: 18px 25px; border-radius: 30px; border: none; 
            background-color: var(--bg-search); color: white; font-size: 16px; 
            outline: none; box-sizing: border-box; text-align: right;
        }

        /* شبكة البطاقات - تم تكبير العرض ليناسب البانرات */
        .app-grid { 
            width: 90%; 
            max-width: 900px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px; 
            justify-content: center; 
        }

        /* تصميم البطاقة الأساسي */
        .app-card { 
            width: 100%; 
            border-radius: 12px; 
            overflow: hidden; 
            cursor: pointer; 
            transition: transform 0.3s; 
            background-color: transparent; 
        }
        .app-card:hover { transform: translateY(-5px); }

        /* حاوية الصورة المخصصة للبانرات */
        .app-card-image { 
            height: 140px; 
            width: 100%;
            background-color: transparent; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border-radius: 12px; 
            overflow: hidden;
        }
        
        /* ضبط حجم الصورة النهائي ليملأ الحاوية بالكامل */
        .app-card-image img { 
            width: 100%; 
            height: 100%; 
            object-fit: fill; /* استخدمنا fill لضمان ظهور كامل الكلام الموجود في البانرات التي صممتها دون أي قص */
        }
        
        .app-card-title { 
            padding: 12px 0; 
            text-align: center; 
            font-size: 16px; 
            font-weight: bold; 
            color: #dcdcdc; 
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-title">ART LIFE STORE</div>
    </header>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="بحث في متجرنا...">
    </div>

    <div class="app-grid">
        
        <div class="app-card" onclick="window.location.href='games.html'">
            <div class="app-card-image">
                <img src="games.png" alt="الألعاب" onerror="this.style.display='none'">
            </div>
            <div class="app-card-title">الألعاب</div>
        </div>

        <div class="app-card" onclick="window.location.href='apps.html'">
            <div class="app-card-image">
                <img src="apps.png" alt="التطبيقات" onerror="this.style.display='none'">
            </div>
            <div class="app-card-title">التطبيقات</div>
        </div>

        <div class="app-card" onclick="window.location.href='mtsy.html'">
            <div class="app-card-image">
                <img src="balances.png" alt="الأرصدة والاتصالات" onerror="this.style.display='none'">
            </div>
            <div class="app-card-title">الأرصدة والاتصالات</div>
        </div>

         <div class="app-card" onclick="window.location.href='social-media.html'">
            <div class="app-card-image">
                <img src="art.png" alt="دعم السوشال ميديا(الرشق)" onerror="this.style.display='none'">
            </div>
            <div class="app-card-title">دعم السوشال ميديا(الرشق)</div>
        </div>
        </div>

    </div>

</body>
</html>
