<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Life | كوكو لايف</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #242424; 
            --bg-search: #333333;
            --bg-modal: #2a2a2a;
            --bg-card-title: #3a3a3a;
            --bg-input: #383838;
            --text-color: #ffffff;
            --text-muted: #999999;
            --btn-red: #ff4d4d;
        }

        body {
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-color);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 80px; 
            overflow-x: hidden;
        }

        /* الشريط العلوي */
        header { 
            width: 100%; padding: 20px 30px; display: flex; justify-content: flex-end; 
            align-items: center; box-sizing: border-box; background-color: var(--bg-main); 
        }
        .page-title { font-size: 24px; font-weight: bold; color: #ffffff; }

        /* شريط البحث */
        .search-container { 
            width: 90%; 
            max-width: 800px; 
            margin: 10px 0 40px 0; 
        }
        .search-bar { 
            width: 100%; 
            padding: 18px 25px; 
            border-radius: 30px; 
            border: none; 
            background-color: var(--bg-search); 
            color: white; 
            font-size: 16px; 
            outline: none; 
            box-sizing: border-box; 
            text-align: right;
        }

        /* شبكة البطاقات */
        .app-grid { 
            width: 90%; 
            max-width: 800px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 200px)); 
            gap: 20px; 
            justify-content: flex-start; 
        }

        /* تصميم البطاقة */
        .app-card {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .app-card:hover { transform: translateY(-5px); }

        .app-card-image {
            height: 140px;
            background: linear-gradient(135deg, #ff0844, #b026ff);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .app-card-image img { 
            width: 100%; 
            height: 115px; 
            object-fit: contain; 
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        
        .mini-badge {
            position: absolute; top: 10px; right: 10px; width: 28px; height: 28px;
            background: #111; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; color: #cfa861; font-size: 10px; font-weight: bold; 
            border: 1px solid #cfa861;
            z-index: 2;
        }

        .app-card-title {
            background-color: var(--bg-card-title);
            padding: 12px;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            color: #dcdcdc;
        }

        /* النافذة المنبثقة (Modal) */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.7); display: none; justify-content: center; 
            align-items: center; z-index: 2000; overflow-y: auto; padding: 20px 0;
        }
        .modal-content { 
            background-color: var(--bg-modal); width: 90%; max-width: 400px; 
            border-radius: 20px; padding: 35px 25px; box-sizing: border-box; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto;
        }

        .modal-header-info { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 30px; 
        }
        .modal-title { font-size: 15px; font-weight: bold; color: #e0e0e0; display: flex; align-items: center; gap: 8px; }
        .modal-title i { color: #888; font-size: 14px; }
        .modal-price-badge { 
            background-color: #000000; color: white; padding: 8px 18px; 
            border-radius: 25px; font-size: 14px; font-weight: bold; 
        }

        .stats-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-box { 
            flex: 1; background-color: var(--bg-input); border-radius: 20px; 
            padding: 15px; text-align: center; 
        }
        .stat-label { color: var(--text-muted); font-size: 13px; margin-bottom: 8px; }
        .stat-value { color: #ffffff; font-size: 16px; font-weight: bold; direction: ltr; }

        .id-input { 
            width: 100%; background-color: var(--bg-input); border: none; padding: 18px; 
            border-radius: 20px; color: white; font-size: 15px; margin-bottom: 25px; 
            box-sizing: border-box; outline: none; text-align: center; 
        }
        .id-input::placeholder { color: var(--text-muted); }

        .modal-actions { display: flex; gap: 15px; margin-bottom: 20px; }
        .btn-cancel, .btn-buy { 
            flex: 1; padding: 15px; border-radius: 25px; font-size: 16px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; 
        }
        .btn-buy { background-color: #000000; color: #ffffff; border: none; }
        .btn-cancel { background-color: transparent; color: var(--btn-red); border: 1.5px solid var(--btn-red); }

        .modal-notice {
            border-right: 3px solid #ffffff; 
            padding-right: 15px;
            margin-top: 30px;
            text-align: right;
            color: #d1d1d1;
            font-size: 13px;
            line-height: 1.8;
        }
        .text-red { color: var(--btn-red); font-weight: bold;}
    </style>
</head>
<body>

    <header>
        <div class="page-title">كوكو لايف</div>
    </header>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="بحث">
    </div>

    <!-- شبكة التطبيقات (بطاقة كوكو لايف) -->
    <div class="app-grid">
        <div class="app-card" onclick="openModal('كوكو لايف A', '15000', '27900 ل.س')">
            <div class="app-card-image">
                <div class="mini-badge">AL</div>
                <img src="cocco.png" alt="Cocco Live" onerror="this.src='https://via.placeholder.com/150'">
            </div>
            <div class="app-card-title">كوكو لايف A</div>
        </div>
    </div>

    <!-- النافذة المنبثقة (Modal) بدون خاصية رفع الصور -->
    <div class="modal-overlay" id="purchaseModal">
        <div class="modal-content">
            <form action="https://formspree.io/f/xkoajqqe" method="POST" id="orderForm">
                
                <input type="hidden" name="اسم_المنتج" id="modalTitleInput">
                <input type="hidden" name="السعر_الإجمالي" id="modalPriceInput">

                <!-- المرحلة الأولى -->
                <div id="step-1">
                    <div class="modal-header-info" style="border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 20px;">
                        <span class="modal-title"><i class="fa-solid fa-cart-shopping"></i> <span id="modalDisplayTitle">اسم المنتج</span></span>
                        <span class="modal-price-badge" id="modalDisplayPrice">27900 ل.س</span>
                    </div>

                    <div style="text-align: right; margin-bottom: 20px; font-size: 13px; color: #bbb;">
                        <p style="margin: 5px 0;">هذا المنتج يعمل بشكل يدوي من الساعة <span style="color:#ff4d4d">11 صباحاً</span> حتى <span style="color:#ff4d4d">12:30 مساءً</span> ✔️</p>
                        <p style="margin: 5px 0;">يتم تنفيذ الطلب خلال <span style="color:#2ecc71">45 دقيقة</span> ✅</p>
                    </div>

                    <input type="text" name="ايدي_المستخدم" id="player_id" class="id-input" placeholder="ايدي المستخدم (ID)" required>
                    
                    <div class="modal-actions" style="display: flex; gap: 12px; margin-top: 20px;">
                        <button type="button" class="btn-buy" onclick="goToStep2()" style="flex: 1; background-color: #000; color: #fff; padding: 14px; border-radius: 25px; border: 1px solid #555;">دفع</button>
                        <button type="button" class="btn-cancel" onclick="closeModal()" style="flex: 1; background-color: transparent; color: #ff4d4d; border: 1.5px solid #ff4d4d; padding: 14px; border-radius: 25px;">إلغاء</button>
                    </div>
                </div>

                <!-- المرحلة الثانية -->
                <div id="step-2" style="display: none;">
                    <div class="modal-header-info" style="border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px;">
                        <span class="modal-title" style="color: #cfa861;">الحسابات البنكية المعتمدة</span>
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <div style="flex: 1; background-color: var(--bg-input); padding: 15px 10px; border-radius: 10px; text-align: center; border: 1px solid #2ecc71; overflow: hidden;">
                            <h4 style="margin: 0 0 10px 0; color: #2ecc71; font-size: 14px;"><i class="fa-solid fa-wallet"></i> شام كاش</h4>
                            <img src="qr-cod.png" alt="شام كاش" style="width: 130px; height: 130px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; background-color: #fff; padding: 5px;">
                            <p style="margin: 0; font-size: 14px; color: #fff; font-weight: bold; word-break: break-all;"></p>
                        </div>

                        <div style="flex: 1; background-color: var(--bg-input); padding: 15px 10px; border-radius: 10px; text-align: center; border: 1px solid #3498db; overflow: hidden;">
                            <h4 style="margin: 0 0 10px 0; color: #3498db; font-size: 14px;"><i class="fa-solid fa-mobile-screen"></i> سيرياتيل كاش</h4>
                            <img src="cash.png.jpeg" alt="سيرياتيل كاش" style="width: 130px; height: 130px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; background-color: #fff; padding: 5px;">
                            <p style="margin: 0; font-size: 14px; color: #fff; font-weight: bold;">25353137</p>
                        </div>
                    </div>

                    <select name="طريقة_الدفع" id="payment_method" class="id-input" onchange="togglePaymentFields()" style="margin-bottom: 15px;" required>
                        <option value="">-- اختر المحفظة التي قمت بالتحويل إليها --</option>
                        <option value="شام كاش">شام كاش</option>
                        <option value="سيرياتيل كاش">سيرياتيل كاش</option>
                    </select>

                    <div id="sham_cash_fields" style="display: none; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #2ecc71; margin-bottom: 15px;">
                        <p style="color:#2ecc71; margin-top:0; font-size:14px; text-align:center;">إثبات دفع شام كاش</p>
                        <input type="text" name="رقم_عملية_شام_كاش" id="sham_trans_id" class="id-input" placeholder="رقم عملية التحويل (شام كاش)" style="margin-bottom: 10px;">
                    </div>

                    <div id="syriatel_fields" style="display: none; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #3498db; margin-bottom: 15px;">
                        <p style="color:#3498db; margin-top:0; font-size:14px; text-align:center;">إثبات دفع سيرياتيل كاش</p>
                        <input type="text" name="رقم_عملية_سيرياتيل" id="syria_trans_id" class="id-input" placeholder="رقم عملية التحويل (سيرياتيل كاش)" style="margin-bottom: 10px;">
                    </div>

                    <div class="modal-actions" style="display: flex; gap: 12px; margin-top: 10px;">
                        <button type="button" class="btn-buy" onclick="validateAndSubmit()" style="flex: 2; background-color: #cfa861; color: #000; padding: 14px; border-radius: 25px; font-weight: bold;">إرسال الطلب للإدارة</button>
                        <button type="button" class="btn-cancel" onclick="goToStep1()" style="flex: 1; background-color: transparent; border: 1px solid #777; color: #fff; padding: 14px; border-radius: 25px;">رجوع</button>
                    </div>
                </div>

            </form>
        </div>
    </div>

    <script>
        function openModal(title, quantity, price) {
            var fullTitle = title + " (الكمية: " + quantity + ")";
            document.getElementById('modalTitleInput').value = fullTitle;
            document.getElementById('modalPriceInput').value = price;
            
            document.getElementById('modalDisplayTitle').innerText = fullTitle;
            document.getElementById('modalDisplayPrice').innerText = price;
            
            document.getElementById('player_id').value = '';
            document.getElementById('payment_method').value = '';
            togglePaymentFields();
            
            document.getElementById('step-1').style.display = 'block';
            document.getElementById('step-2').style.display = 'none';
            
            document.getElementById('purchaseModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('purchaseModal').style.display = 'none';
        }

        function goToStep2() {
            var playerId = document.getElementById('player_id').value.trim();
            if(playerId === "") {
                alert("يرجى إدخال ايدي المستخدم أولاً للمتابعة.");
                return;
            }
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }

        function goToStep1() {
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-1').style.display = 'block';
        }

        function togglePaymentFields() {
            var method = document.getElementById('payment_method').value;
            var shamFields = document.getElementById('sham_cash_fields');
            var syriaFields = document.getElementById('syriatel_fields');

            shamFields.style.display = 'none';
            syriaFields.style.display = 'none';

            if (method === "شام كاش") {
                shamFields.style.display = 'block';
            } else if (method === "سيرياتيل كاش") {
                syriaFields.style.display = 'block';
            }
        }

        function validateAndSubmit() {
            var method = document.getElementById('payment_method').value;
            if (method === "") {
                alert("يرجى اختيار طريقة الدفع (شام كاش أو سيرياتيل كاش).");
                return;
            }

            if (method === "شام كاش") {
                if (document.getElementById('sham_trans_id').value.trim() === "") {
                    alert("يرجى إدخال رقم العملية لشام كاش.");
                    return;
                }
            } else if (method === "سيرياتيل كاش") {
                if (document.getElementById('syria_trans_id').value.trim() === "") {
                    alert("يرجى إدخال رقم العملية لسيرياتيل كاش.");
                    return;
                }
            }

            document.getElementById('orderForm').submit();
        }
    </script>
</body>
</html>
