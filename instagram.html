<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Life | دعم انستغرام</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* 
         الدرس الأول: متغيرات الـ CSS للحفاظ على تناسق الألوان (Design System)
        */
        :root {
            --bg-color: #262626; 
            --header-bg: #1f1f1f;
            --text-color: #ffffff;
            --main-gold: #cfa861;
            --neon-gold: 0 0 10px #cfa861, 0 0 20px #cfa861;
            --modal-bg: #222222;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; 
            padding-bottom: 80px; overflow-x: hidden;
        }

        /* الشريط العلوي */
        header { 
            width: 100%; padding: 15px 30px; display: flex; justify-content: space-between; 
            align-items: center; box-sizing: border-box; background-color: var(--header-bg); 
            border-bottom: 2px solid var(--main-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        
        .logo-main { font-size: 22px; font-weight: bold; color: var(--main-gold); text-shadow: var(--neon-gold); text-decoration: none; }
        .page-title { font-size: 18px; font-weight: bold; color: #ccc; }
        .back-btn { color: var(--main-gold); text-decoration: none; font-size: 22px; transition: 0.3s; }
        .back-btn:hover { transform: scale(1.1); }

        /* شريط البحث */
        .search-container { width: 90%; max-width: 1000px; margin: 30px 0 25px 0; }
        .search-bar { 
            width: 100%; padding: 15px 20px; border-radius: 25px; border: 1px solid #333; 
            background-color: #1a1a1a; color: white; font-size: 16px; outline: none; 
            box-sizing: border-box; text-align: right;
        }
        .search-bar:focus { border-color: var(--main-gold); }

        /* 
         الدرس الثاني: CSS Grid لتوزيع البطاقات بشكل متجاوب
        */
        .uc-grid { 
            width: 90%; max-width: 1000px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 25px; 
        }
        .uc-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.3s; }
        .uc-wrapper:hover { transform: translateY(-5px); }

        /* صندوق البطاقة */
        .uc-box {
            width: 100%; height: 140px; border-radius: 12px; position: relative;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4); border: 1px solid #444; 
            transition: 0.3s; overflow: hidden;
        }
        .uc-wrapper:hover .uc-box { border-color: var(--main-gold); box-shadow: 0 5px 15px rgba(207, 168, 97, 0.2); }

        /* 
         التطبيق العملي للدرس السابق:
         تعبئة الصورة داخل الصندوق بالكامل باستخدام object-fit
        */
        .uc-image { 
            width: 100%; height: 100%; display: block; object-fit: cover; transition: 0.3s; 
        }
        .uc-wrapper:hover .uc-image { transform: scale(1.05); }

        .uc-details { margin-top: 15px; text-align: center; }
        .uc-title { font-size: 16px; font-weight: bold; color: white; margin-bottom: 5px; }
        .uc-price { font-size: 15px; color: var(--main-gold); font-weight: bold; }

        /* النافذة المنبثقة للطلب المربوطة بـ Formspree */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; 
            align-items: center; z-index: 2000; backdrop-filter: blur(5px); 
            overflow-y: auto; padding: 20px 0;
        }
        .modal-content { 
            background-color: var(--modal-bg); width: 90%; max-width: 400px; 
            border-radius: 15px; padding: 30px; box-sizing: border-box; 
            border: 1px solid var(--main-gold); box-shadow: 0 10px 25px rgba(0,0,0,0.8);
        }
        .modal-header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-size: 16px; color: white; font-weight: bold; }
        .modal-price-badge { background-color: #111; color: var(--main-gold); padding: 5px 15px; border-radius: 15px; border: 1px solid #333;}
        
        .id-input { 
            width: 100%; background-color: #111; border: 1px solid #444; padding: 15px; 
            border-radius: 10px; color: white; font-size: 15px; margin-bottom: 20px; 
            box-sizing: border-box; outline: none; transition: 0.3s; text-align: left; direction: ltr; 
        }
        .id-input:focus { border-color: var(--main-gold); }
        
        .modal-actions { display: flex; gap: 15px; margin-bottom: 15px; }
        .btn-cancel, .btn-buy { flex: 1; padding: 12px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-cancel { background-color: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; }
        .btn-cancel:hover { background-color: rgba(255, 77, 77, 0.1); }
        .btn-buy { background-color: var(--main-gold); color: #111; border: none; }
        .btn-buy:hover { background-color: #e0b612; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-main">ART LIFE</a>
        <div class="page-title">دعم انستغرام</div>
        <!-- نعود إلى صفحة بوابه السوشال ميديا -->
        <a href="social-media.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    </header>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="بحث عن خدمة...">
    </div>

    <!-- شبكة خدمات الانستغرام -->
    <div class="uc-grid">
        
        <!-- متابعين -->
        <div class="uc-wrapper" onclick="openModal('متابعين - انستغرام', 'حدد السعر')">
            <!-- يرجى التأكد من اسم الصورة على جهازك -->
            <div class="uc-box"><img src="ig.png" alt="Instagram Followers" class="uc-image"></div>
            <div class="uc-details"><div class="uc-title">متابعين - انستغرام</div><div class="uc-price">حدد السعر</div></div>
        </div>

        <!-- إعجابات -->
        <div class="uc-wrapper" onclick="openModal('إعجابات - انستغرام', 'حدد السعر')">
            <div class="uc-box"><img src="ig.png" alt="Instagram Likes" class="uc-image"></div>
            <div class="uc-details"><div class="uc-title">اعجابات - انستغرام</div><div class="uc-price">حدد السعر</div></div>
        </div>

        <!-- مشاهدات -->
        <div class="uc-wrapper" onclick="openModal('مشاهدات - انستغرام', 'حدد السعر')">
            <div class="uc-box"><img src="ig.png" alt="Instagram Views" class="uc-image"></div>
            <div class="uc-details"><div class="uc-title">مشاهدات - انستغرام</div><div class="uc-price">حدد السعر</div></div>
        </div>
        
        <!-- مشاركات -->
        <div class="uc-wrapper" onclick="openModal('مشاركات - انستغرام - العدد 100', '30 ل.س')">
            <div class="uc-box"><img src="ig.png" alt="Instagram Shares" class="uc-image"></div>
            <div class="uc-details"><div class="uc-title">مشاركات - انستغرام</div><div class="uc-price">30 ل.س</div></div>
        </div>

        <!-- حفظ ريلز -->
        <div class="uc-wrapper" onclick="openModal('حفظ ريلز - انستغرام - العدد 500', '40 ل.س')">
            <div class="uc-box"><img src="ig.png" alt="Instagram Saves" class="uc-image"></div>
            <div class="uc-details"><div class="uc-title">حفظ ريلز - انستغرام</div><div class="uc-price">40 ل.س</div></div>
        </div>

        <!-- ريبوست -->
        <div class="uc-wrapper" onclick="openModal('ريبوست - انستغرام -العدد 100', '30 ل.س')">
            <div class="uc-box"><img src="ig.png" alt="Instagram Repost" class="uc-image"></div>
            <div class="uc-details"><div class="uc-title">ريبوست - انستغرام</div><div class="uc-price">30 ل.س</div></div>
        </div>

    </div>

    <!-- النافذة المنبثقة المدمجة مع Formspree -->
    <div class="modal-overlay" id="purchaseModal">
        <div class="modal-content">
            <form action="https://formspree.io/f/xkoajqqe" method="POST" id="orderForm">
                
                <input type="hidden" name="اسم_الخدمة" id="modalTitleInput">
                <input type="hidden" name="السعر" id="modalPriceInput">

                <!-- المرحلة الأولى: إدخال الرابط -->
                <div id="step-1">
                    <div class="modal-header-info">
                        <span id="modalDisplayTitle">الخدمة</span>
                        <span class="modal-price-badge" id="modalDisplayPrice">السعر</span>
                    </div>

                    <input type="url" name="رابط_المنشور_أو_الحساب" id="target_link" class="id-input" placeholder="أدخل رابط المنشور أو الحساب هنا..." required>
                    
                    <div class="modal-actions">
                        <button type="button" class="btn-cancel" onclick="closeModal()">إلغاء</button>
                        <button type="button" class="btn-buy" onclick="goToStep2()">التالي</button>
                    </div>
                </div>

                <!-- المرحلة الثانية: الدفع -->
                <div id="step-2" style="display: none;">
                    <div class="modal-header-info" style="border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 15px;">
                        <span style="color: var(--main-gold); font-weight: bold;">الحسابات البنكية المعتمدة</span>
                    </div>

                    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                        <div style="flex: 1; background-color: #111; padding: 15px 10px; border-radius: 10px; text-align: center; border: 1px solid #2ecc71; overflow: hidden;">
                            <h4 style="margin: 0 0 10px 0; color: #2ecc71; font-size: 14px;"><i class="fa-solid fa-wallet"></i> شام كاش</h4>
                            <img src="qr-cod.png" alt="شام كاش" style="width: 130px; height: 130px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; background-color: #fff; padding: 5px;">
                        </div>

                        <div style="flex: 1; background-color: #111; padding: 15px 10px; border-radius: 10px; text-align: center; border: 1px solid #3498db; overflow: hidden;">
                            <h4 style="margin: 0 0 10px 0; color: #3498db; font-size: 14px;"><i class="fa-solid fa-mobile-screen"></i> سيرياتيل كاش</h4>
                            <img src="cash.png.jpeg" alt="سيرياتيل كاش" style="width: 130px; height: 130px; object-fit: contain; border-radius: 8px; margin-bottom: 10px; background-color: #fff; padding: 5px;">
                        </div>
                    </div>

                    <select name="طريقة_الدفع" id="payment_method" class="id-input" onchange="togglePaymentFields()" style="margin-bottom: 15px;" required>
                        <option value="">-- اختر المحفظة التي قمت بالتحويل إليها --</option>
                        <option value="شام كاش">شام كاش</option>
                        <option value="سيرياتيل كاش">سيرياتيل كاش</option>
                    </select>

                    <div id="sham_cash_fields" style="display: none; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #2ecc71; margin-bottom: 15px;">
                        <p style="color:#2ecc71; margin-top:0; font-size:14px; text-align:center;">إثبات دفع شام كاش</p>
                        <input type="text" name="رقم_عملية_شام_كاش" id="sham_trans_id" class="id-input" placeholder="رقم عملية التحويل (شام كاش)" style="margin-bottom: 0;">
                    </div>

                    <div id="syriatel_fields" style="display: none; background: #111; padding: 15px; border-radius: 10px; border: 1px solid #3498db; margin-bottom: 15px;">
                        <p style="color:#3498db; margin-top:0; font-size:14px; text-align:center;">إثبات دفع سيرياتيل كاش</p>
                        <input type="text" name="رقم_عملية_سيرياتيل" id="syria_trans_id" class="id-input" placeholder="رقم عملية التحويل (سيرياتيل كاش)" style="margin-bottom: 0;">
                    </div>

                    <div class="modal-actions" style="margin-bottom: 0;">
                        <button type="button" class="btn-cancel" onclick="goToStep1()">رجوع</button>
                        <button type="button" class="btn-buy" onclick="validateAndSubmit()">إرسال الطلب</button>
                    </div>
                </div>

            </form>
        </div>
    </div>

    <!-- 
      الدرس الثالث: التفاعل بواسطة الجافاسكربت (DOM Manipulation)
    -->
    <script>
        function openModal(title, price) {
            document.getElementById('modalTitleInput').value = title;
            document.getElementById('modalPriceInput').value = price;
            
            document.getElementById('modalDisplayTitle').innerText = title;
            document.getElementById('modalDisplayPrice').innerText = price;
            
            document.getElementById('target_link').value = '';
            document.getElementById('payment_method').value = '';
            togglePaymentFields(); 
            
            document.getElementById('step-1').style.display = 'block';
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('purchaseModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('purchaseModal').style.display = 'none';
        }

        function goToStep2() {
            var targetLink = document.getElementById('target_link').value.trim();
            
            if (targetLink === "") {
                alert("يرجى إدخال رابط المنشور أو الحساب أولاً للمتابعة!");
                return;
            }

            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }

        function goToStep1() {
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-1').style.display = 'block';
        }

        function togglePaymentFields() {
            var method = document.getElementById('payment_method').value;
            var shamFields = document.getElementById('sham_cash_fields');
            var syriaFields = document.getElementById('syriatel_fields');

            shamFields.style.display = 'none';
            syriaFields.style.display = 'none';

            if (method === "شام كاش") {
                shamFields.style.display = 'block';
            } else if (method === "سيرياتيل كاش") {
                syriaFields.style.display = 'block';
            }
        }

        function validateAndSubmit() {
            var method = document.getElementById('payment_method').value;
            if (method === "") {
                alert("يرجى اختيار المحفظة التي قمت بالتحويل إليها أولاً.");
                return;
            }

            if (method === "شام كاش") {
                if (document.getElementById('sham_trans_id').value.trim() === "") {
                    alert("يرجى إدخال رقم العملية لشام كاش.");
                    return;
                }
            } else if (method === "سيرياتيل كاش") {
                if (document.getElementById('syria_trans_id').value.trim() === "") {
                    alert("يرجى إدخال رقم العملية لسيرياتيل كاش.");
                    return;
                }
            }

            // إرسال البيانات بشكل فعلي إلى Formspree
            document.getElementById('orderForm').submit();
        }
    </script>
</body>
</html>
