<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Life | ببجي موبايل</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #262626; /* لون خلفية رمادي داكن مطابق للصورة */
            --header-bg: #1f1f1f;
            --card-bg: #333333;
            --text-color: #ffffff;
            --main-gold: #cfa861;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* الشريط العلوي */
        header {
            width: 100%;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            background-color: var(--bg-color);
        }

        .back-btn {
            color: var(--text-color);
            text-decoration: none;
            font-size: 22px;
        }

        .page-title {
            font-size: 20px;
            font-weight: bold;
        }

        /* البانر الإعلاني لشعار اللعبة */
        .banner-container {
            width: 90%;
            max-width: 800px;
            height: 200px;
            margin: 10px auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .banner-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        /* شريط البحث */
        .search-container {
            width: 90%;
            max-width: 800px;
            margin-bottom: 30px;
        }

        .search-bar {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            border: none;
            background-color: var(--card-bg);
            color: white;
            font-size: 16px;
            outline: none;
            text-align: right;
            box-sizing: border-box;
        }

        /* شبكة السيرفرات / الخيارات */
        .servers-grid {
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding-bottom: 50px;
        }

        /* تصميم بطاقة السيرفر */
        .server-card {
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .server-card:hover {
            transform: translateY(-5px);
        }

        .server-image-wrapper {
            width: 100%;
            height: 140px;
            border-radius: 15px;
            overflow: hidden;
            background: linear-gradient(135deg, #5c4e43, #2b2521); /* تدرج لوني مشابه للصورة */
            display: flex;
            justify-content: center;
            align-items: flex-end; /* لجلوس الشخصية في الأسفل */
            position: relative;
            border: 1px solid #444;
        }

        /* شعار Art Life الصغير داخل البطاقة */
        .card-logo {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background-color: rgba(0,0,0,0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--main-gold);
            color: var(--main-gold);
            font-size: 12px;
        }

        .server-image-wrapper img {
            height: 90%;
            object-fit: contain;
        }

        .server-title {
            margin-top: 10px;
            font-size: 15px;
            font-weight: bold;
            text-align: center;
        }

    </style>
</head>
<body>

    <header>
        <div style="width: 24px;"></div> <div class="page-title">ببجي موبايل</div>
        <a href="games.html" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
    </header>

    <div class="banner-container">
        <img src="pubg-a.png" alt="شعار ببجي">
    </div>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="بحث...">
    </div>

    <div class="servers-grid">
        
        <a href="pubg-fast.html" class="server-card">
            <div class="server-image-wrapper">
                <div class="card-logo">AL</div>
                <img src="pubg-b.png" alt="ببجي سريع">
            </div>
            <div class="server-title">ببجي سريع</div>
        </a>

        <a href="pubg-fast-2.html" class="server-card">
            <div class="server-image-wrapper">
                <div class="card-logo">AL</div>
                <img src="pubg-b.png" alt="ببجي سريع (سيرفر 2)">
            </div>
            <div class="server-title">ببجي سريع (سيرفر 2)</div>
        </a>

        <a href="pubg-fast-3.html" class="server-card">
            <div class="server-image-wrapper">
                <div class="card-logo">AL</div>
                <img src="pubg-b.png" alt="ببجي سريع (سيرفر 3)">
            </div>
            <div class="server-title">ببجي سريع (سيرفر 3)</div>
        </a>

    </div>

</body>
</html>
