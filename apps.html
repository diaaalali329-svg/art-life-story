<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Life | تطبيقات المحادثة والبث</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            /* الألوان الأساسية لمتجرك */
            --bg-color: #2c2c2c; 
            --search-bg: #383838;
            --text-color: #ffffff;
            --main-gold: #cfa861;
            --neon-gold: 0 0 10px #cfa861, 0 0 20px #cfa861;
        }

        body {
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-bottom: 80px; 
            overflow-x: hidden;
        }

        /* الشريط العلوي */
        header { 
            width: 100%; padding: 15px 30px; display: flex; justify-content: space-between; 
            align-items: center; box-sizing: border-box; background-color: #1a1a1a; 
            border-bottom: 2px solid var(--main-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        
        .logo-main { font-size: 22px; font-weight: bold; color: var(--main-gold); text-decoration: none; }
        .page-title { font-size: 18px; font-weight: bold; color: #ccc; }
        .back-btn { color: var(--main-gold); text-decoration: none; font-size: 22px; transition: 0.3s; }

        /* شريط البحث */
        .search-container { 
            width: 90%; 
            max-width: 1000px; 
            margin: 25px 0 30px 0; 
        }
        
        .search-bar { 
            width: 100%; 
            padding: 15px 25px; 
            border-radius: 25px; 
            border: none; 
            background-color: var(--search-bg); 
            color: white; 
            font-size: 15px; 
            outline: none; 
            box-sizing: border-box; 
            text-align: right;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        /* هندسة الشبكة (Grid Layout) لترتيب 3 أعمدة بشكل متجاوب */
        .app-grid { 
            width: 95%; 
            max-width: 1000px; 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 25px; 
            justify-content: center;
        }

        .app-wrapper { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            cursor: pointer; 
            transition: transform 0.3s; 
            text-decoration: none; /* لمنع ظهور خط تحت الروابط */
        }
        .app-wrapper:hover { transform: translateY(-5px); }

        /* حاوية بطاقة التطبيق (ذات الحواف الدائرية والخلفية الملونة) */
        .app-box {
            width: 100%; 
            height: 140px;
            border-radius: 20px; 
            position: relative;
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            transition: 0.3s;
        }
        
        /* شارة المتجر الذهبية (Badge) في الزاوية العلوية اليسرى */
        .mini-badge {
            position: absolute; 
            top: 10px; 
            left: 10px; 
            width: 32px; 
            height: 32px;
            background: linear-gradient(135deg, #111, #333); 
            border-radius: 50%; 
            display: flex;
            align-items: center; 
            justify-content: center; 
            color: var(--main-gold); 
            font-size: 11px;
            font-weight: bold; 
            border: 1.5px solid var(--main-gold);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* صورة أيقونة التطبيق في المنتصف */
        .app-image { 
            width: 90%; 
            max-height: 130px; 
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            transition: 0.3s ease;
            z-index: 1;
        }
        .app-wrapper:hover .app-image { transform: scale(1.1); }

        /* عنوان التطبيق بالأسفل */
        .app-title { 
            margin-top: 12px; 
            font-size: 15px; 
            font-weight: bold; 
            color: #ffffff; 
            text-align: center;
        }

        /* فئات الألوان المتدرجة (Gradients) المستوحاة من الصورة */
        .grad-purple-pink { background: linear-gradient(135deg, #b026ff, #ff0844); }
        .grad-light-blue { background: linear-gradient(135deg, #8ec5fc, #e0c3fc); }
        .grad-orange-pink { background: linear-gradient(135deg, #ff758c, #ff7eb3); }
        .grad-yellow-green { background: linear-gradient(135deg, #f6d365, #fda085); }
        .grad-teal { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .grad-dark-blue { background: linear-gradient(135deg, #1e3c72, #2a5298); }
        .grad-green { background: linear-gradient(135deg, #43e97b, #38f9d7); }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-main">ART LIFE</a>
        <div class="page-title">تطبيقات البث والمحادثة</div>
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    </header>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="بحث عن تطبيق...">
    </div>

    <!-- شبكة التطبيقات -->
    <div class="app-grid">
        
        <!-- الصف الأول -->
        <a href="hami-party.html" class="app-wrapper">
            <div class="app-box grad-light-blue">
                <div class="mini-badge">AL</div>
                <img src="hami.png" alt="هامي بارتي" class="app-image">
            </div>
            <div class="app-title">هامي بارتي</div>
        </a>
        <!-- الصنف الثاني -->
        <a href="cocco-live.html" class="app-wrapper">
            <div class="app-box grad-purple-pink">
                <div class="mini-badge">AL</div>
                <img src="cocco.png" alt="كوكو لايف" class="app-image">
            </div>
            <div class="app-title">كوكو لايف</div>
        </a>

        <a href="forfun-chat.html" class="app-wrapper">
            <div class="app-box grad-yellow-green">
                <div class="mini-badge">AL</div>
                <img src="four.png" alt="فور فان شات" class="app-image">
            </div>
            <div class="app-title">فور فان شات</div>
        </a>

        <a href="bigo-live.html" class="app-wrapper">
            <div class="app-box grad-teal">
                <div class="mini-badge">AL</div>
                <img src="bigo.png" alt="بيغو لايف" class="app-image">
            </div>
            <div class="app-title">بيغو لايف</div>
        </a>

        <a href="soulchill.html" class="app-wrapper">
            <div class="app-box grad-light-blue">
                <div class="mini-badge">AL</div>
                <img src="soul.png" alt="سول شيل" class="app-image">
            </div>
            <div class="app-title">سول شيل</div>
        </a>

    </div>

</body>
</html>
