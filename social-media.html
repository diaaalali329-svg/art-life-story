<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Life | دعم السوشال ميديا</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #262626; /* لون الخلفية الداكن */
            --header-bg: #1f1f1f;
            --text-color: #ffffff;
            --main-gold: #cfa861;
        }

        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            padding-bottom: 80px; overflow-x: hidden;
        }

        /* الشريط العلوي */
        header {
            width: 100%; padding: 15px 30px; display: flex; justify-content: space-between;
            align-items: center; box-sizing: border-box; background-color: var(--header-bg);
            border-bottom: 2px solid var(--main-gold); box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .logo-main { font-size: 22px; font-weight: bold; color: var(--main-gold); text-decoration: none; letter-spacing: 2px; }
        .page-title { font-size: 18px; font-weight: bold; color: #ffffff; }
        .back-btn { color: var(--main-gold); text-decoration: none; font-size: 22px; transition: 0.3s; }
        .back-btn:hover { transform: scale(1.1); }

        /* شريط البحث */
        .search-container { width: 90%; max-width: 1000px; margin: 30px 0 20px 0; }
        .search-bar { 
            width: 100%; padding: 18px 25px; border-radius: 30px; border: none; 
            background-color: #333; color: white; font-size: 16px; outline: none; 
            box-sizing: border-box; text-align: right; box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }

        /* شبكة بطاقات السوشال ميديا */
        .social-grid {
            width: 90%; max-width: 1000px; display: grid;
            /* 3 أعمدة في الشاشات الكبيرة، ويتكيف تلقائياً للجوال */
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px; margin-top: 10px;
        }

        .social-wrapper {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; cursor: pointer; transition: transform 0.3s ease;
        }
        .social-wrapper:hover { transform: translateY(-8px); }

        /* صندوق البطاقة الملون */
        .social-card {
            width: 100%; height: 140px; border-radius: 20px; position: relative;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4); overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
        }

        /* التدرجات اللونية الخاصة بكل منصة (مطابقة للصورة) */
        .yt-bg { background: linear-gradient(135deg, #ff0000, #8b0000); }
        .fb-bg { background: linear-gradient(135deg, #1877f2, #063970); }
        .ig-bg { background: linear-gradient(135deg, #f09433, #dc2743, #bc1888); }
        .tg-bg { background: linear-gradient(135deg, #0088cc, #005580); }
        .kw-bg { background: linear-gradient(135deg, #ff8c00, #cc5200); }
        .tk-bg { background: linear-gradient(135deg, #333333, #000000); }

        /* الأيقونات الجانبية */
        .side-icons {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 6px; font-size: 12px;
        }
        .side-icons i { background: rgba(255,255,255,0.2); padding: 4px; border-radius: 50%; color: #fff; }

        /* شارة 1S Store */
        .badge-logo {
            position: absolute; top: 12px; right: 12px; width: 35px; height: 35px;
            background: linear-gradient(135deg, #111, #333); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: var(--main-gold); font-size: 11px; font-weight: bold; border: 1.5px solid var(--main-gold);
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* اللوجو المركزي المجسم */
        .center-logo { width: 80%; max-height: 100px; object-fit: contain; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.5)); }

        /* اسم المنصة أسفل البطاقة */
        .social-title { font-size: 18px; font-weight: bold; color: #ffffff; margin-top: 15px; }

    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo-main">ART LIFE</a>
        <div class="page-title">دعم السوشال ميديا</div>
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    </header>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="بحث...">
    </div>

    <div class="social-grid">
        
        <a href="youtube.html" class="social-wrapper">
            <div class="social-card yt-bg">
                <div class="side-icons"><i class="fa-brands fa-instagram"></i><i class="fa-brands fa-facebook"></i><i class="fa-brands fa-twitter"></i></div>
                <div class="badge-logo">1S</div>
                <img src="yu.png" alt="YouTube" class="center-logo">
            </div>
            <div class="social-title">دعم يوتيوب</div>
        </a>

        <a href="facebook.html" class="social-wrapper">
            <div class="social-card fb-bg">
                <div class="side-icons"><i class="fa-brands fa-instagram"></i><i class="fa-brands fa-facebook"></i><i class="fa-brands fa-twitter"></i></div>
                <div class="badge-logo">1S</div>
                <img src="fb.png" alt="Facebook" class="center-logo">
            </div>
            <div class="social-title">دعم فيسبوك</div>
        </a>

        <a href="instagram.html" class="social-wrapper">
            <div class="social-card ig-bg">
                <div class="side-icons"><i class="fa-brands fa-instagram"></i><i class="fa-brands fa-facebook"></i><i class="fa-brands fa-twitter"></i></div>
                <div class="badge-logo">1S</div>
                <img src="ig.png" alt="Instagram" class="center-logo">
            </div>
            <div class="social-title">دعم انستغرام</div>
        </a>

        <a href="tiktok.html" class="social-wrapper">
            <div class="social-card tk-bg">
                <div class="side-icons"><i class="fa-brands fa-instagram"></i><i class="fa-brands fa-facebook"></i><i class="fa-brands fa-twitter"></i></div>
                <div class="badge-logo">1S</div>
                <img src="tiktok.png" alt="TikTok" class="center-logo">
            </div>
            <div class="social-title">دعم تيك توك</div>
        </a>

    </div>

</body>
</html>
